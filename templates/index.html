<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wiki-CN 问答</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/style.css?v=3" />
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-inner">
        <div class="logo" style="display:flex;align-items:center;gap:10px;">
          <img src="/static/favicon.svg" alt="logo" style="width:34px;height:34px;" />
          <div style="font-weight:700;font-size:16px;color:#0b7285;">viki</div>
        </div>
        <button id="newChatBtn" class="new-chat-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          开启新对话
        </button>
      </div>
    </div>
    <div class="sidebar-list-container" id="sidebarListContainer">
      <!-- 渲染历史会话 -->
    </div>
  </aside>

  <main class="main-content">
        <div class="chat-top-bar">
          <div class="top-inner">
            <div style="display:flex; gap:12px; align-items:center; width:100%; justify-content:center;">
              <div style="font-weight:600;">基于Wiki-CN 的 RAG 问答系统</div>
            </div>
            <div id="engineStatus" class="system-status-pill">系统状态：正在检查...</div>
          </div>
        </div>

        <div class="chat-area">
          <div class="chat-card">
            <div class="chat-history" id="chatHistory" style="max-width:880px;padding-left:24px;padding-right:24px;box-sizing:border-box;margin:0 auto;">
              <!-- 聊天历史将通过 app.js 动态渲染进这里 -->
            </div>
          </div>
        </div>

        <div class="chat-input-area" style="width: min(880px, calc(100% - 48px)); max-width:880px; left:50%; transform:translateX(-50%); padding-left:24px; padding-right:24px;">
          <div class="chat-input-container">
            <div class="input-controls">
              <label class="control-item" for="allowWeb">
                <input id="allowWeb" type="checkbox" />
                <span>联网补充</span>
              </label>
              <div class="control-item">
                <span>记忆轮次</span>
                <input id="historyLen" type="number" min="0" max="10" value="5" class="num-input" />
              </div>
              <div style="flex:1"></div>
              <button id="toggleStatusBtn" class="control-item action-btn">模块状态</button>
            </div>

            <div class="input-wrapper">
              <textarea id="q" placeholder="给 Wiki-CN 问答助手 发送消息... (Shift+Enter 换行, Enter 发送)"></textarea>
              <button id="askBtn" class="send-btn" title="发送">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
              </button>
            </div>
            <div class="input-footer">内容由 Wiki-CN 回答系统生成，仅供参考。</div>
          </div>
        </div>
  <div id="statusModal" class="status-modal" style="display:none;">
    <div class="status-modal-content card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0">模块状态</h2>
        <button id="closeStatusBtn" class="action-btn">关闭</button>
      </div>
      <ul id="moduleStatusList" class="module-status-list">
        <!-- 模块状态将由脚本填充 -->
      </ul>
    </div>
  </div>

  <script src="/static/app.js?v=3"></script>
</body>
</html>
